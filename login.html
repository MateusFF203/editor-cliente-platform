<!DOCTYPE html>
<link rel="stylesheet" href="style.css">
<html lang="pt-BR">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Faça Login</h1>
    </header>

    <main>
        <form id="formLogin">

            <input type="password" id="senhaLogin" placeholder="Senha" required>

        </form>
    </main>

    <script src="login.js"></script>
</body>

</html>
