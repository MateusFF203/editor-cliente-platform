<!DOCTYPE html>
<link rel="stylesheet" href="style.css">
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<h1>Criar Conta</h1>

</header>


<nav>

<a href="index.html">Home</a>

</nav>


<form id="cadastro">


<input 
id="nome"
placeholder="Nome completo"
required>


<input
id="email"
placeholder="Email"
required>



<label>

<label class="check">
<input type="checkbox" id="editorCheck">
Conta de Editor
</label>


<div id="dadosEditor" class="hidden">

<input 
id="certificado"
placeholder="Certificado de editor">


<select id="nivel">

<option>Iniciante</option>
<option>Intermediário</option>
<option>Profissional</option>
<option>Especialista</option>

</select>


<input
type="number"
id="valor"
placeholder="Preço do serviço">


</div>


<button onclick="criarConta()">
Criar Conta
</button>


<script src="script.js"></script>


</body>

</html>
