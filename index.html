<label class="check">
    <input type="checkbox" id="editorCheck">
    Conta de Editor
</label>

<div id="dadosEditor" class="esconder">

    <input
        type="text"
        id="certificado"
        placeholder="Nome do Certificado"
    >

    <label class="upload-certificado">
        📄 Enviar Certificado
        <input
            type="file"
            id="arquivoCertificado"
            accept=".pdf,.jpg,.jpeg,.png"
        >
    </label>

    <select id="nivel">
        <option>Iniciante</option>
        <option>Intermediário</option>
        <option>Avançado</option>
        <option>Profissional</option>
    </select>

    <input
        type="number"
        id="valorServico"
        placeholder="Valor do Serviço (R$)"
    >

</div>
