<!DOCTYPE html>
<link rel="stylesheet" href="style.css">
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Editor Cliente Platform</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>🎬 Editor Cliente Platform</h1>

<p>Contrate editores profissionais</p>

</header>


<nav>

<a href="index.html">Home</a>

<a href="cadastro.html">Cadastro</a>

</nav>


<main>

<h2>Editores disponíveis</h2>


<div id="listaEditores"></div>


</main>


<script>


let lista =
document.getElementById("listaEditores");


let editores =
JSON.parse(localStorage.getItem("editores")) || [];



if(editores.length === 0){


lista.innerHTML =
"<p>Nenhum editor disponível</p>";


}



editores.forEach(editor=>{


lista.innerHTML += `

<div class="editor">


<h2>${editor.nome}</h2>


<p>✔ Verificado</p>


<p>⭐ Nível: ${editor.nivel}</p>


<p>💰 R$ ${editor.valor}</p>


<button>

Contratar

</button>


</div>


`;


});


</script>


</body>

</html>
